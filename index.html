<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>五一邀请（移动端最强整蛊版）</title>
<style>
body{margin:0;font-family:sans-serif;background:#111;color:#fff;text-align:center;overflow:hidden}
.container{position:relative;height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center}
button{padding:15px 30px;font-size:18px;margin:10px;border:none;border-radius:12px;cursor:pointer}
#yes{background:#4CAF50;color:#fff}
#no{background:#f44336;color:#fff;position:absolute}
#cat{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);width:260px;border-radius:20px;z-index:10}
.flash{position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;opacity:0;z-index:9}
</style>
</head>
<body>
<div class="container">
<h1>五一有没有空？😏</h1>
<button id="yes" onclick="yesClick()">有空😊</button>
<button id="no" ontouchstart="moveBtn()" onclick="moveBtn()">没空😢</button>
</div>

<img id="cat" src="https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif">
<div class="flash" id="flash"></div>
<audio id="gun" src="https://www.soundjay.com/button/sounds/button-16.mp3"></audio>

<script>
const noBtn = document.getElementById('no');
let speed = 1;

function moveBtn(){
    const x = Math.random()* (window.innerWidth-100);
    const y = Math.random()* (window.innerHeight-50);
    noBtn.style.left = x+'px';
    noBtn.style.top = y+'px';
    noBtn.style.transform = `scale(${1 - speed*0.1})`;
    speed += 0.3; // 越来越难点
    vibrate();
}

function vibrate(){
    if(navigator.vibrate){
        navigator.vibrate([50,30,50]);
    }
}

function flash(){
    const f = document.getElementById('flash');
    f.style.opacity = 0.8;
    setTimeout(()=>{f.style.opacity=0;},200);
}

function yesClick(){
    document.body.innerHTML = '<h1 style="margin-top:40vh">🎉 好！那就一起过五一！</h1>';
}

// 被迫点到
noBtn.addEventListener('click', ()=>{
    showKill();
});

function showKill(){
    const cat = document.getElementById('cat');
    cat.style.display='block';
    cat.style.transform='translate(-50%,-50%) scale(1.2)';

    flash();
    vibrate();

    const audio = document.getElementById('gun');
    audio.play().catch(()=>{});

    document.body.style.background='red';

    setTimeout(()=>{
        document.body.innerHTML='<h1 style="margin-top:40vh">☠️ 被猫猫制裁了！</h1>';
    },800);
}
</script>
</body>
</html>
