        <div class="step" id="step2">
            <h1>📅 选择日期</h1>
            <p class="question">五一哪几天有时间呢？<br><small style="color: #999;">（至少选择2天）</small></p>
            <div class="date-grid" id="dateGrid">
                <div class="date-item" data-date="5月1日" onclick="toggleDate(this)">5月1日（周三）</div>
                <div class="date-item" data-date="5月2日" onclick="toggleDate(this)">5月2日（周四）</div>
                <div class="date-item" data-date="5月3日" onclick="toggleDate(this)">5月3日（周五）</div>
                <div class="date-item" data-date="5月4日" onclick="toggleDate(this)">5月4日（周六）</div>
                <div class="date-item" data-date="5月5日" onclick="toggleDate(this)">5月5日（周日）</div>
            </div>
            <div class="btn-group">
                <button class="btn-secondary" onclick="goToStep(1)">上一步</button>
                <button class="btn-primary" onclick="validateAndGoNext()">下一步</button>
            </div>
        </div>

// ... existing code ...

        <div class="step" id="stepEnd">
            <div class="result">
                <div class="result-icon">😢</div>
                <h1>好的吧~</h1>
                <p class="result-text">那下次再约哦！<br>期待下次有机会一起玩~</p>
            </div>
        </div>

        <div class="step" id="stepNotEnoughDays">
            <div class="result">
                <div class="result-icon">😅</div>
                <h1>时间有点少呢~</h1>
                <p class="result-text">只选了{{selectedDates.length}}天，至少需要2天才能一起玩哦！<br>下次多留点时间吧~</p>
            </div>
        </div>
    </div>

    <script>
        let selectedDates = [];
        let selectedCity = '';

        function updateProgress(step) {
            const progress = ((step - 1) / 3) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function goToStep(step) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
            updateProgress(step);
        }

        function handleNoTime() {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('stepEnd').classList.add('active');
            updateProgress(4);
        }

        function handleNotEnoughDays() {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('stepNotEnoughDays').classList.add('active');
            
            const message = `只选了${selectedDates.length}天，至少需要2天才能一起玩哦！`;
            document.querySelector('#stepNotEnoughDays .result-text').innerHTML = 
                `${message}<br>下次多留点时间吧~`;
            
            updateProgress(4);
        }

        function goToStep2() {
            goToStep(2);
        }

        function toggleDate(element) {
            const date = element.dataset.date;
            if (element.classList.contains('selected')) {
                element.classList.remove('selected');
                selectedDates = selectedDates.filter(d => d !== date);
            } else {
                element.classList.add('selected');
                selectedDates.push(date);
            }
        }

        function validateAndGoNext() {
            if (selectedDates.length < 2) {
                handleNotEnoughDays();
                return;
            }
            goToStep(3);
        }

        function selectCity(element) {
            document.querySelectorAll('.city-item').forEach(item => {
                item.classList.remove('selected');
            });
            element.classList.add('selected');
            selectedCity = element.dataset.city;
            document.getElementById('cityError').style.display = 'none';
        }

        function submitForm() {
            if (!selectedCity) {
                document.getElementById('cityError').style.display = 'block';
                return;
            }

            document.getElementById('resultDates').textContent = selectedDates.join('、');
            document.getElementById('resultCity').textContent = selectedCity;

            const data = {
                dates: selectedDates,
                city: selectedCity,
                time: new Date().toLocaleString('zh-CN')
            };
            
            let allResponses = JSON.parse(localStorage.getItem('surveyResponses') || '[]');
            allResponses.push(data);
            localStorage.setItem('surveyResponses', JSON.stringify(allResponses));
            
            console.log('提交的数据：', data);

            goToStep('Result');
            updateProgress(4);
        }

        updateProgress(1);
    </script>
