<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>五一假期安排</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.container {
    background: white;
    border-radius: 24px;
    padding: 50px 40px;
    max-width: 500px;
    width: 100%;
    box-shadow: 0 25px 80px rgba(0, 0, 0, 0.25);
}

h1 {
    color: #333;
    text-align: center;
    margin-bottom: 8px;
    font-size: 32px;
    font-weight: 700;
}

.subtitle {
    text-align: center;
    color: #999;
    margin-bottom: 35px;
    font-size: 15px;
}

.step {
    display: none;
}

.step.active {
    display: block;
    animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

.date-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
    gap: 12px;
    margin: 25px 0;
}

.date-item {
    padding: 18px 12px;
    border: 2px solid #f0f0f0;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: center;
    background: #fafafa;
}

.date-item:hover {
    border-color: #667eea;
    transform: translateY(-3px);
    box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
}

.date-item.selected {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border-color: #667eea;
    box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
}

.date-day {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 6px;
}

.date-weekday {
    font-size: 13px;
    opacity: 0.7;
}

.btn-group {
    display: flex;
    gap: 12px;
    margin-top: 35px;
}

button {
    flex: 1;
    padding: 16px;
    font-size: 16px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: 600;
}

.btn-primary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
}

.btn-primary:active {
    transform: translateY(0);
}

.btn-secondary {
    background: #f5f5f5;
    color: #666;
}

.btn-secondary:hover {
    background: #ebebeb;
}

.city-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin: 20px 0;
}

.city-item {
    padding: 16px;
    border: 2px solid #f0f0f0;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: center;
    font-size: 15px;
    background: #fafafa;
    font-weight: 500;
}

.city-item:hover {
    border-color: #667eea;
    transform: scale(1.03);
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
}

.city-item.selected {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border-color: #667eea;
    box-shadow: 0 6px 18px rgba(102, 126, 234, 0.35);
}

.city-intro {
    margin-top: 20px;
    padding: 20px;
    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    border-radius: 16px;
    display: none;
    animation: slideDown 0.4s ease;
}

.city-intro.show {
    display: block;
}

@keyframes slideDown {
    from { opacity: 0; max-height: 0; }
    to { opacity: 1; max-height: 500px; }
}

.intro-title {
    font-size: 20px;
    font-weight: 700;
    color: #333;
    margin-bottom: 12px;
    text-align: center;
}

.intro-section {
    margin: 12px 0;
    padding: 12px;
    background: white;
    border-radius: 10px;
}

.intro-label {
    font-size: 14px;
    color: #667eea;
    font-weight: 600;
    margin-bottom: 6px;
}

.intro-text {
    font-size: 14px;
    color: #555;
    line-height: 1.6;
}

.other-input {
    margin-top: 15px;
    display: none;
}

.other-input.show {
    display: block;
    animation: slideDown 0.3s ease;
}

input[type="text"] {
    width: 100%;
    padding: 14px;
    border: 2px solid #f0f0f0;
    border-radius: 12px;
    font-size: 15px;
    transition: all 0.3s;
    background: #fafafa;
}

input[type="text"]:focus {
    outline: none;
    border-color: #667eea;
    background: white;
}

.summary {
    background: #f8f9fa;
    padding: 25px;
    border-radius: 16px;
    margin: 20px 0;
}

.summary-item {
    margin: 12px 0;
    padding: 15px;
    background: white;
    border-radius: 12px;
}

.summary-label {
    color: #999;
    font-size: 13px;
    margin-bottom: 6px;
}

.summary-value {
    color: #333;
    font-size: 18px;
    font-weight: 600;
}

.error-message {
    color: #ff4757;
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
    display: none;
    font-weight: 500;
}

.error-message.show {
    display: block;
    animation: shake 0.5s;
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
}

.success-page {
    text-align: center;
    padding: 50px 20px;
}

.success-icon {
    font-size: 90px;
    margin-bottom: 25px;
}

.success-summary {
    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    padding: 25px;
    border-radius: 16px;
    margin: 25px 0;
    text-align: left;
}

.success-item {
    margin: 15px 0;
    padding: 15px;
    background: white;
    border-radius: 12px;
}

.success-label {
    font-size: 13px;
    color: #999;
    margin-bottom: 6px;
    font-weight: 600;
}

.success-value {
    font-size: 17px;
    color: #333;
    font-weight: 600;
    line-height: 1.6;
}

.success-intro {
    margin-top: 15px;
    padding: 15px;
    background: white;
    border-radius: 12px;
}

.success-intro-title {
    font-size: 14px;
    color: #667eea;
    font-weight: 700;
    margin-bottom: 8px;
}

.success-intro-text {
    font-size: 14px;
    color: #555;
    line-height: 1.6;
}

.end-page {
    text-align: center;
    padding: 50px 20px;
}

.end-icon {
    font-size: 90px;
    margin-bottom: 25px;
}

.progress-bar {
    height: 5px;
    background: #f0f0f0;
    border-radius: 3px;
    margin-bottom: 35px;
    overflow: hidden;
}

.progress-fill {
    height: 100%;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    transition: width 0.4s ease;
    border-radius: 3px;
}
</style>
</head>
<body>
<div class="container">
    <div id="step1" class="step active">
        <div class="progress-bar">
            <div class="progress-fill" style="width: 33%"></div>
        </div>
        <h1>📅 五一哪天有空？</h1>
        
        <div class="date-grid">
            <div class="date-item" data-date="5月1日" onclick="toggleDate(this)">
                <div class="date-day">5月1日</div>
                <div class="date-weekday">周四</div>
            </div>
            <div class="date-item" data-date="5月2日" onclick="toggleDate(this)">
                <div class="date-day">5月2日</div>
                <div class="date-weekday">周五</div>
            </div>
            <div class="date-item" data-date="5月3日" onclick="toggleDate(this)">
                <div class="date-day">5月3日</div>
                <div class="date-weekday">周六</div>
            </div>
            <div class="date-item" data-date="5月4日" onclick="toggleDate(this)">
                <div class="date-day">5月4日</div>
                <div class="date-weekday">周日</div>
            </div>
            <div class="date-item" data-date="5月5日" onclick="toggleDate(this)">
                <div class="date-day">5月5日</div>
                <div class="date-weekday">周一</div>
            </div>
        </div>
        
        <div class="btn-group">
            <button class="btn-secondary" onclick="resetDates()">重置</button>
            <button class="btn-primary" onclick="checkAndNext()">下一步</button>
        </div>
    </div>

    <div id="step2" class="step">
        <div class="progress-bar">
            <div class="progress-fill" style="width: 66%"></div>
        </div>
        <h1>🏙️ 想去哪里？</h1>
        <p class="subtitle">选择一个城市</p>
        
        <div class="city-grid">
            <div class="city-item" data-city="北京" onclick="selectCity(this)">北京</div>
            <div class="city-item" data-city="上海" onclick="selectCity(this)">上海</div>
            <div class="city-item" data-city="广州" onclick="selectCity(this)">广州</div>
            <div class="city-item" data-city="深圳" onclick="selectCity(this)">深圳</div>
            <div class="city-item" data-city="成都" onclick="selectCity(this)">成都</div>
            <div class="city-item" data-city="杭州" onclick="selectCity(this)">杭州</div>
            <div class="city-item" data-city="西安" onclick="selectCity(this)">西安</div>
            <div class="city-item" data-city="重庆" onclick="selectCity(this)">重庆</div>
            <div class="city-item" data-city="南京" onclick="selectCity(this)">南京</div>
            <div class="city-item" data-city="武汉" onclick="selectCity(this)">武汉</div>
            <div class="city-item" data-city="other" onclick="selectOtherCity(this)">其他 ✏️</div>
        </div>
        
        <div class="city-intro" id="cityIntro">
            <div class="intro-title" id="introTitle"></div>
            <div class="intro-section">
                <div class="intro-label">🍜 美食推荐</div>
                <div class="intro-text" id="introFood"></div>
            </div>
            <div class="intro-section">
                <div class="intro-label">🎯 必玩景点</div>
                <div class="intro-text" id="introPlay"></div>
            </div>
        </div>
        
        <div class="other-input" id="otherInput">
            <input type="text" id="customCity" placeholder="输入城市名称..." oninput="updateCustomCity()">
        </div>
        
        <div class="error-message" id="cityError">请选择一个城市！</div>
        
        <div class="btn-group" style="margin-top: 20px;">
            <button class="btn-secondary" onclick="backToStep1()">上一步</button>
            <button class="btn-primary" onclick="nextToSubmit()">下一步</button>
        </div>
        
        <div class="btn-group" style="margin-top: 12px;">
            <button class="btn-secondary" onclick="restart()" style="width: 100%;">重新开始</button>
        </div>
    </div>

    <div id="step3" class="step">
        <div class="progress-bar">
            <div class="progress-fill" style="width: 100%"></div>
        </div>
        <h1>✅ 确认信息</h1>
        <p class="subtitle">请确认是否正确</p>
        
        <div class="summary">
            <div class="summary-item">
                <div class="summary-label">有空日期</div>
                <div class="summary-value" id="summaryDates"></div>
            </div>
            <div class="summary-item">
                <div class="summary-label">目的地</div>
                <div class="summary-value" id="summaryCity"></div>
            </div>
        </div>
        
        <div class="btn-group">
            <button class="btn-secondary" onclick="backToStep2()">返回修改</button>
            <button class="btn-primary" onclick="submitForm()">提交</button>
        </div>
    </div>

    <div id="successPage" class="step">
        <div class="success-page">
            <div class="success-icon">🎉</div>
            <h1>提交成功！</h1>
            <p class="subtitle">期待一起度过美好的五一假期！</p>
            
            <div class="success-summary">
                <div class="success-item">
                    <div class="success-label">📅 有空日期</div>
                    <div class="success-value" id="successDates"></div>
                </div>
                <div class="success-item">
                    <div class="success-label">🏙️ 目的地</div>
                    <div class="success-value" id="successCity"></div>
                </div>
                <div class="success-intro" id="successFoodIntro" style="display: none;">
                    <div class="success-intro-title">🍜 美食推荐</div>
                    <div class="success-intro-text" id="successFood"></div>
                </div>
                <div class="success-intro" id="successPlayIntro" style="display: none;">
                    <div class="success-intro-title">🎯 必玩景点</div>
                    <div class="success-intro-text" id="successPlay"></div>
                </div>
            </div>
            
            <div class="btn-group" style="margin-top: 30px;">
                <button class="btn-primary" onclick="restart()">重新开始</button>
            </div>
        </div>
    </div>

    <div id="endPage" class="step">
        <div class="end-page">
            <div class="end-icon">😢</div>
            <h1>太可惜了...</h1>
            <p class="subtitle">等你有空的时候再约吧！</p>
            <div class="btn-group" style="margin-top: 40px;">
                <button class="btn-primary" onclick="restart()">重新开始</button>
            </div>
        </div>
    </div>
</div>

<script>
let selectedDates = [];
let selectedCity = '';
let customCityName = '';

const cityData = {
    '北京': {
        food: '烤鸭、炸酱面、豆汁儿、涮羊肉、驴打滚、糖火烧',
        play: '故宫、长城、颐和园、天坛、南锣鼓巷、三里屯'
    },
    '上海': {
        food: '小笼包、生煎包、红烧肉、本帮菜、蟹粉豆腐、鲜肉月饼',
        play: '外滩、东方明珠、迪士尼、豫园、南京路、武康路'
    },
    '广州': {
        food: '早茶、肠粉、云吞面、白切鸡、烧鹅、双皮奶、艇仔粥',
        play: '广州塔、长隆、沙面、上下九、白云山、珠江夜游'
    },
    '深圳': {
        food: '椰子鸡、海鲜大餐、肠粉、烧腊、猪肚鸡、椰子冻',
        play: '世界之窗、欢乐谷、大梅沙、东部华侨城、莲花山'
    },
    '成都': {
        food: '火锅、串串香、担担面、兔头、钟水饺、龙抄手、三大炮',
        play: '宽窄巷子、锦里、大熊猫基地、武侯祠、杜甫草堂、春熙路'
    },
    '杭州': {
        food: '西湖醋鱼、龙井虾仁、东坡肉、叫花鸡、片儿川、葱包烩',
        play: '西湖、灵隐寺、宋城、千岛湖、西溪湿地、雷峰塔'
    },
    '西安': {
        food: '肉夹馍、羊肉泡馍、凉皮、biangbiang面、葫芦鸡、甑糕',
        play: '兵马俑、大雁塔、钟鼓楼、城墙、回民街、大唐不夜城'
    },
    '重庆': {
        food: '火锅、小面、酸辣粉、毛血旺、江湖菜、山城小汤圆',
        play: '洪崖洞、磁器口、解放碑、长江索道、武隆、大足石刻'
    },
    '南京': {
        food: '盐水鸭、鸭血粉丝汤、秦淮小吃、牛肉锅贴、梅花糕',
        play: '夫子庙、中山陵、玄武湖、明孝陵、总统府、秦淮河'
    },
    '武汉': {
        food: '热干面、鸭脖、豆皮、糊汤粉、面窝、武昌鱼、汤包',
        play: '黄鹤楼、东湖、户部巷、武汉大学、江汉路、长江大桥'
    }
};

function toggleDate(element) {
    const date = element.dataset.date;
    
    if (element.classList.contains('selected')) {
        element.classList.remove('selected');
        selectedDates = selectedDates.filter(d => d !== date);
    } else {
        element.classList.add('selected');
        selectedDates.push(date);
    }
}

function resetDates() {
    document.querySelectorAll('.date-item').forEach(item => {
        item.classList.remove('selected');
    });
    selectedDates = [];
}

function checkAndNext() {
    if (selectedDates.length < 2) {
        showStep('endPage');
    } else {
        showStep('step2');
    }
}

function selectCity(element) {
    document.querySelectorAll('.city-item').forEach(item => {
        item.classList.remove('selected');
    });
    
    element.classList.add('selected');
    selectedCity = element.dataset.city;
    document.getElementById('otherInput').classList.remove('show');
    document.getElementById('cityError').classList.remove('show');
    
    if (cityData[selectedCity]) {
        document.getElementById('introTitle').textContent = selectedCity;
        document.getElementById('introFood').textContent = cityData[selectedCity].food;
        document.getElementById('introPlay').textContent = cityData[selectedCity].play;
        document.getElementById('cityIntro').classList.add('show');
    } else {
        document.getElementById('cityIntro').classList.remove('show');
    }
}

function selectOtherCity(element) {
    document.querySelectorAll('.city-item').forEach(item => {
        item.classList.remove('selected');
    });
    
    element.classList.add('selected');
    selectedCity = 'other';
    document.getElementById('otherInput').classList.add('show');
    document.getElementById('customCity').focus();
    document.getElementById('cityError').classList.remove('show');
    document.getElementById('cityIntro').classList.remove('show');
}

function updateCustomCity() {
    customCityName = document.getElementById('customCity').value.trim();
}

function nextToSubmit() {
    if (!selectedCity) {
        document.getElementById('cityError').classList.add('show');
        return;
    }
    
    if (selectedCity === 'other' && !customCityName) {
        document.getElementById('cityError').textContent = '请填写城市名称！';
        document.getElementById('cityError').classList.add('show');
        return;
    }
    
    const cityText = selectedCity === 'other' ? customCityName : selectedCity;
    document.getElementById('summaryDates').textContent = selectedDates.join('、');
    document.getElementById('summaryCity').textContent = cityText;
    
    showStep('step3');
}

function submitForm() {
    const cityText = selectedCity === 'other' ? customCityName : selectedCity;
    
    document.getElementById('successDates').textContent = selectedDates.join('、');
    document.getElementById('successCity').textContent = cityText;
    
    if (cityData[selectedCity]) {
        document.getElementById('successFood').textContent = cityData[selectedCity].food;
        document.getElementById('successPlay').textContent = cityData[selectedCity].play;
        document.getElementById('successFoodIntro').style.display = 'block';
        document.getElementById('successPlayIntro').style.display = 'block';
    } else {
        document.getElementById('successFoodIntro').style.display = 'none';
        document.getElementById('successPlayIntro').style.display = 'none';
    }
    
    showStep('successPage');
    
    console.log('提交的数据：', {
        dates: selectedDates,
        city: selectedCity === 'other' ? customCityName : selectedCity
    });
}

function backToStep1() {
    showStep('step1');
}

function backToStep2() {
    showStep('step2');
}

function restart() {
    resetDates();
    selectedCity = '';
    customCityName = '';
    document.getElementById('customCity').value = '';
    document.getElementById('otherInput').classList.remove('show');
    document.getElementById('cityError').classList.remove('show');
    document.getElementById('cityIntro').classList.remove('show');
    showStep('step1');
}

function showStep(stepId) {
    document.querySelectorAll('.step').forEach(step => {
        step.classList.remove('active');
    });
    document.getElementById(stepId).classList.add('active');
}
</script>
</body>
</html>
