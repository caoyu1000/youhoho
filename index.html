<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>五一邀请</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 10;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 30px;
            text-align: center;
        }

        .question {
            font-size: 20px;
            color: #555;
            margin-bottom: 25px;
            text-align: center;
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .date-grid {
            display: grid;
            gap: 12px;
            margin: 20px 0;
        }

        .date-item {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .date-item.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: scale(1.02);
        }

        .city-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 20px 0;
            max-height: 450px;
            overflow-y: auto;
        }

        .city-item {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .city-item.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .city-item.other-city {
            grid-column: span 2;
            background: #fff9e6;
            border-color: #ffd666;
        }

        .city-item.other-city.selected {
            background: linear-gradient(135deg, #faad14 0%, #ffc53d 100%);
            border-color: #faad14;
        }

        .custom-city-input {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            animation: slideDown 0.3s ease-out;
        }

        .custom-city-input.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .custom-city-input label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        .custom-city-input input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .custom-city-input input:focus {
            border-color: #667eea;
        }

        .result {
            text-align: center;
            padding: 20px;
        }

        .result-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .cat-gun-icon {
            font-size: 100px;
            margin-bottom: 20px;
            animation: catShoot 0.8s ease;
        }

        @keyframes catShoot {
            0% {
                transform: scale(0) rotate(0deg);
            }
            50% {
                transform: scale(1.3) rotate(-15deg);
            }
            70% {
                transform: scale(1.1) rotate(5deg);
            }
            100% {
                transform: scale(1) rotate(0deg);
            }
        }

        .gunshot {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 150px;
            opacity: 0;
            pointer-events: none;
            z-index: 1000;
        }

        .gunshot.animate {
            animation: gunshotEffect 0.6s ease-out forwards;
        }

        @keyframes gunshotEffect {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0);
            }
            30% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.5);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(2);
            }
        }

        .screen-flash {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 999;
        }

        .screen-flash.animate {
            animation: flash 0.3s ease-out;
        }

        @keyframes flash {
            0% { opacity: 0; }
            50% { opacity: 0.8; }
            100% { opacity: 0; }
        }

        .result-text {
            font-size: 20px;
            color: #666;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .result-detail {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: left;
        }

        .result-detail p {
            margin: 10px 0;
            font-size: 16px;
        }

        .progress-bar {
            height: 4px;
            background: #f0f0f0;
            border-radius: 2px;
            margin-bottom: 30px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            top: -10px;
            z-index: 999;
            pointer-events: none;
        }

        .confetti.animate {
            animation: confetti-fall 3s ease-out forwards;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .success-bg {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%) !important;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
            }

            .question {
                font-size: 18px;
            }

            .city-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="gunshot" id="gunshot">💥</div>
    <div class="screen-flash" id="screenFlash"></div>

    <div class="container" id="mainContainer">
        <div class="progress-bar">
            <div class="progress-fill" id="progressBar" style="width: 0%"></div>
        </div>

        <div class="step active" id="step1">
            <h1>🎉 五一邀请</h1>
            <p class="question">五一有没有空呀？</p>
            <div class="btn-group">
                <button class="btn-secondary" onclick="handleNoTime()">没空😢</button>
                <button class="btn-primary" onclick="goToStep2()">有空😊</button>
            </div>
        </div>

        <div class="step" id="step2">
            <h1>📅 选择日期</h1>
            <p class="question">五一哪几天有时间呢？</p>
            <div class="date-grid" id="dateGrid">
                <div class="date-item" data-date="5月1日" onclick="toggleDate(this)">5月1日（周三）</div>
                <div class="date-item" data-date="5月2日" onclick="toggleDate(this)">5月2日（周四）</div>
                <div class="date-item" data-date="5月3日" onclick="toggleDate(this)">5月3日（周五）</div>
                <div class="date-item" data-date="5月4日" onclick="toggleDate(this)">5月4日（周六）</div>
                <div class="date-item" data-date="5月5日" onclick="toggleDate(this)">5月5日（周日）</div>
            </div>
            <div class="btn-group">
                <button class="btn-secondary" onclick="goToStep(1)">上一步</button>
                <button class="btn-primary" onclick="validateAndGoNext()">下一步</button>
            </div>
        </div>

        <div class="step" id="step3">
            <h1>🏙️ 选择城市</h1>
            <p class="question">想去哪个城市玩呢？</p>
            <div class="city-grid" id="cityGrid">
                <div class="city-item" data-city="北京" onclick="selectCity(this)">北京</div>
                <div class="city-item" data-city="上海" onclick="selectCity(this)">上海</div>
                <div class="city-item" data-city="广州" onclick="selectCity(this)">广州</div>
                <div class="city-item" data-city="深圳" onclick="selectCity(this)">深圳</div>
                <div class="city-item" data-city="成都" onclick="selectCity(this)">成都</div>
                <div class="city-item" data-city="杭州" onclick="selectCity(this)">杭州</div>
                <div class="city-item" data-city="重庆" onclick="selectCity(this)">重庆</div>
                <div class="city-item" data-city="西安" onclick="selectCity(this)">西安</div>
                <div class="city-item" data-city="南京" onclick="selectCity(this)">南京</div>
                <div class="city-item" data-city="武汉" onclick="selectCity(this)">武汉</div>
                <div class="city-item" data-city="厦门" onclick="selectCity(this)">厦门</div>
                <div class="city-item" data-city="青岛" onclick="selectCity(this)">青岛</div>
                <div class="city-item" data-city="大理" onclick="selectCity(this)">大理</div>
                <div class="city-item" data-city="丽江" onclick="selectCity(this)">丽江</div>
                <div class="city-item" data-city="三亚" onclick="selectCity(this)">三亚</div>
                <div class="city-item" data-city="桂林" onclick="selectCity(this)">桂林</div>
                <div class="city-item" data-city="昆明" onclick="selectCity(this)">昆明</div>
                <div class="city-item" data-city="长沙" onclick="selectCity(this)">长沙</div>
                <div class="city-item" data-city="苏州" onclick="selectCity(this)">苏州</div>
                <div class="city-item" data-city="天津" onclick="selectCity(this)">天津</div>
                <div class="city-item other-city" data-city="其他" onclick="selectOtherCity(this)">✨ 其他（自行填写）</div>
            </div>
            
            <div class="custom-city-input" id="customCityInput">
                <label>请输入你想去的城市：</label>
                <input type="text" id="customCityText" placeholder="例如：拉萨、哈尔滨、珠海..." oninput="updateCustomCity(this.value)">
            </div>

            <div class="btn-group">
                <button class="btn-secondary" onclick="goToStep(2)">上一步</button>
                <button class="btn-primary" onclick="submitForm()">提交</button>
            </div>
        </div>

        <div class="step" id="stepResult">
            <div class="result">
                <div class="result-icon">🎊</div>
                <h1>太棒了！</h1>
                <div class="result-detail">
                    <p><strong>可用时间：</strong><span id="resultDates"></span></p>
                    <p><strong>想去城市：</strong><span id="resultCity"></span></p>
                </div>
                <p class="result-text">期待和你一起度过美好的五一假期！<br>我们不见不散哦~</p>
            </div>
        </div>

        <div class="step" id="stepEnd">
            <div class="result">
                <div class="cat-gun-icon">🐱🔫</div>
                <h1 style="color: #ff4d4f;">砰！</h1>
                <p class="result-text">居然没空！<br>被猫猫枪毙了！☠️</p>
            </div>
        </div>

        <div class="step" id="stepNotEnoughDays">
            <div class="result">
                <div class="cat-gun-icon">🐱🔫</div>
                <h1 style="color: #ff4d4f;">砰！</h1>
                <p class="result-text" id="notEnoughDaysText"></p>
            </div>
        </div>
    </div>

    <script>
        let selectedDates = [];
        let selectedCity = '';
        let isOtherCity = false;

        function updateProgress(step) {
            const progress = ((step - 1) / 3) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function goToStep(step) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
            updateProgress(step);
        }

        function createGunshot() {
            const gunshot = document.getElementById('gunshot');
            const screenFlash = document.getElementById('screenFlash');
            
            gunshot.classList.add('animate');
            screenFlash.classList.add('animate');
            
            if (navigator.vibrate) {
                navigator.vibrate([100, 50, 100]);
            }
            
            setTimeout(() => {
                gunshot.classList.remove('animate');
                screenFlash.classList.remove('animate');
            }, 800);
        }

        function createConfetti() {
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffa500', '#ff69b4'];
            
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti animate';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    confetti.style.animationDelay = Math.random() * 0.5 + 's';
                    
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => {
                        confetti.remove();
                    }, 4000);
                }, i * 30);
            }
            
            document.body.classList.add('success-bg');
        }

        function handleNoTime() {
            createGunshot();
            
            setTimeout(() => {
                document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
                document.getElementById('stepEnd').classList.add('active');
                updateProgress(4);
            }, 600);
        }

        function handleNotEnoughDays() {
            createGunshot();
            
            setTimeout(() => {
                document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
                document.getElementById('stepNotEnoughDays').classList.add('active');
                
                const daysCount = selectedDates.length;
                const message = `只选了${daysCount}天！<br>被猫猫枪毙了！☠️`;
                document.getElementById('notEnoughDaysText').innerHTML = message;
                
                updateProgress(4);
            }, 600);
        }

        function goToStep2() {
            goToStep(2);
        }

        function toggleDate(element) {
            const date = element.dataset.date;
            if (element.classList.contains('selected')) {
                element.classList.remove('selected');
                selectedDates = selectedDates.filter(d => d !== date);
            } else {
                element.classList.add('selected');
                selectedDates.push(date);
            }
        }

        function validateAndGoNext() {
            if (selectedDates.length < 2) {
                handleNotEnoughDays();
                return;
            }
            goToStep(3);
        }

        function selectCity(element) {
            document.querySelectorAll('.city-item').forEach(item => {
                item.classList.remove('selected');
            });
            
            element.classList.add('selected');
            selectedCity = element.dataset.city;
            isOtherCity = false;
            
            document.getElementById('customCityInput').classList.remove('show');
            document.getElementById('customCityText').value = '';
        }

        function selectOtherCity(element) {
            document.querySelectorAll('.city-item').forEach(item => {
                item.classList.remove('selected');
            });
            
            element.classList.add('selected');
            selectedCity = '其他';
            isOtherCity = true;
            
            document.getElementById('customCityInput').classList.add('show');
            document.getElementById('customCityText').focus();
        }

        function updateCustomCity(value) {
            if (value.trim()) {
                selectedCity = value.trim();
            }
        }

        function submitForm() {
            if (!selectedCity || (isOtherCity && !document.getElementById('customCityText').value.trim())) {
                alert('请选择或输入一个城市哦~');
                return;
            }

            document.getElementById('resultDates').textContent = selectedDates.join('、');
            document.getElementById('resultCity').textContent = selectedCity;

            goToStep('Result');
            updateProgress(4);
            
            setTimeout(() => {
                createConfetti();
            }, 300);
        }

        updateProgress(1);
    </script>
</body>
</html>
