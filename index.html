<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>五一假期安排</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.container {
    background: white;
    border-radius: 24px;
    padding: 50px 40px;
    max-width: 500px;
    width: 100%;
    box-shadow: 0 25px 80px rgba(0, 0, 0, 0.25);
}

h1 {
    color: #333;
    text-align: center;
    margin-bottom: 8px;
    font-size: 32px;
    font-weight: 700;
}

.subtitle {
    text-align: center;
    color: #999;
    margin-bottom: 35px;
    font-size: 15px;
}

.step {
    display: none;
}

.step.active {
    display: block;
    animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

.date-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
    gap: 12px;
    margin: 25px 0;
}

.date-item {
    padding: 18px 12px;
    border: 2px solid #f0f0f0;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: center;
    background: #fafafa;
}

.date-item:hover {
    border-color: #667eea;
    transform: translateY(-3px);
    box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
}

.date-item.selected {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border-color: #667eea;
    box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
}

.date-day {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 6px;
}

.date-weekday {
    font-size: 13px;
    opacity: 0.7;
}

.btn-group {
    display: flex;
    gap: 12px;
    margin-top: 35px;
}

button {
    flex: 1;
    padding: 16px;
    font-size: 16px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: 600;
}

.btn-primary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
}

.btn-primary:active {
    transform: translateY(0);
}

.btn-secondary {
    background: #f5f5f5;
    color: #666;
}

.btn-secondary:hover {
    background: #ebebeb;
}

.city-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin: 20px 0;
}

.city-item {
    padding: 16px;
    border: 2px solid #f0f0f0;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: center;
    font-size: 15px;
    background: #fafafa;
    font-weight: 500;
}

.city-item:hover {
    border-color: #667eea;
    transform: scale(1.03);
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
}

.city-item.selected {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border-color: #667eea;
    box-shadow: 0 6px 18px rgba(102, 126, 234, 0.35);
}

.other-input {
    margin-top: 15px;
    display: none;
}

.other-input.show {
    display: block;
    animation: slideDown 0.3s ease;
}

@keyframes slideDown {
    from { opacity: 0; max-height: 0; }
    to { opacity: 1; max-height: 100px; }
}

input[type="text"] {
    width: 100%;
    padding: 14px;
    border: 2px solid #f0f0f0;
    border-radius: 12px;
    font-size: 15px;
    transition: all 0.3s;
    background: #fafafa;
}

input[type="text"]:focus {
    outline: none;
    border-color: #667eea;
    background: white;
}

.summary {
    background: #f8f9fa;
    padding: 25px;
    border-radius: 16px;
    margin: 20px 0;
}

.summary-item {
    margin: 12px 0;
    padding: 15px;
    background: white;
    border-radius: 12px;
}

.summary-label {
    color: #999;
    font-size: 13px;
    margin-bottom: 6px;
}

.summary-value {
    color: #333;
    font-size: 18px;
    font-weight: 600;
}

.error-message {
    color: #ff4757;
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
    display: none;
    font-weight: 500;
}

.error-message.show {
    display: block;
    animation: shake 0.5s;
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
}

.success-page {
    text-align: center;
    padding: 50px 20px;
}

.success-icon {
    font-size: 90px;
    margin-bottom: 25px;
}

.end-page {
    text-align: center;
    padding: 50px 20px;
}

.end-icon {
    font-size: 90px;
    margin-bottom: 25px;
}

.progress-bar {
    height: 5px;
    background: #f0f0f0;
    border-radius: 3px;
    margin-bottom: 35px;
    overflow: hidden;
}

.progress-fill {
    height: 100%;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    transition: width 0.4s ease;
    border-radius: 3px;
}
</style>
</head>
<body>
<div class="container">
    <div id="step1" class="step active">
        <div class="progress-bar">
            <div class="progress-fill" style="width: 33%"></div>
        </div>
        <h1>📅 五一哪天有空？</h1>
        
        <div class="date-grid">
            <div class="date-item" data-date="5月1日" onclick="toggleDate(this)">
                <div class="date-day">5月1日</div>
                <div class="date-weekday">周四</div>
            </div>
            <div class="date-item" data-date="5月2日" onclick="toggleDate(this)">
                <div class="date-day">5月2日</div>
                <div class="date-weekday">周五</div>
            </div>
            <div class="date-item" data-date="5月3日" onclick="toggleDate(this)">
                <div class="date-day">5月3日</div>
                <div class="date-weekday">周六</div>
            </div>
            <div class="date-item" data-date="5月4日" onclick="toggleDate(this)">
                <div class="date-day">5月4日</div>
                <div class="date-weekday">周日</div>
            </div>
            <div class="date-item" data-date="5月5日" onclick="toggleDate(this)">
                <div class="date-day">5月5日</div>
                <div class="date-weekday">周一</div>
            </div>
        </div>
        
        <div class="btn-group">
            <button class="btn-secondary" onclick="resetDates()">重置</button>
            <button class="btn-primary" onclick="checkAndNext()">下一步</button>
        </div>
    </div>

    <div id="step2" class="step">
        <div class="progress-bar">
            <div class="progress-fill" style="width: 66%"></div>
        </div>
        <h1>🏙️ 想去哪里？</h1>
        <p class="subtitle">选择一个城市</p>
        
        <div class="city-grid">
            <div class="city-item" data-city="北京" onclick="selectCity(this)">北京</div>
            <div class="city-item" data-city="上海" onclick="selectCity(this)">上海</div>
            <div class="city-item" data-city="广州" onclick="selectCity(this)">广州</div>
            <div class="city-item" data-city="深圳" onclick="selectCity(this)">深圳</div>
            <div class="city-item" data-city="成都" onclick="selectCity(this)">成都</div>
            <div class="city-item" data-city="杭州" onclick="selectCity(this)">杭州</div>
            <div class="city-item" data-city="西安" onclick="selectCity(this)">西安</div>
            <div class="city-item" data-city="重庆" onclick="selectCity(this)">重庆</div>
            <div class="city-item" data-city="南京" onclick="selectCity(this)">南京</div>
            <div class="city-item" data-city="武汉" onclick="selectCity(this)">武汉</div>
            <div class="city-item" data-city="other" onclick="selectOtherCity(this)">其他 ✏️</div>
        </div>
        
        <div class="other-input" id="otherInput">
            <input type="text" id="customCity" placeholder="输入城市名称..." oninput="updateCustomCity()">
        </div>
        
        <div class="error-message" id="cityError">请选择一个城市！</div>
        
        <div class="btn-group" style="margin-top: 20px;">
            <button class="btn-secondary" onclick="backToStep1()">上一步</button>
            <button class="btn-primary" onclick="nextToSubmit()">下一步</button>
        </div>
        
        <div class="btn-group" style="margin-top: 12px;">
            <button class="btn-secondary" onclick="restart()" style="width: 100%;">重新开始</button>
        </div>
    </div>

    <div id="step3" class="step">
        <div class="progress-bar">
            <div class="progress-fill" style="width: 100%"></div>
        </div>
        <h1>✅ 确认信息</h1>
        <p class="subtitle">请确认是否正确</p>
        
        <div class="summary">
            <div class="summary-item">
                <div class="summary-label">有空日期</div>
                <div class="summary-value" id="summaryDates"></div>
            </div>
            <div class="summary-item">
                <div class="summary-label">目的地</div>
                <div class="summary-value" id="summaryCity"></div>
            </div>
        </div>
        
        <div class="btn-group">
            <button class="btn-secondary" onclick="backToStep2()">返回修改</button>
            <button class="btn-primary" onclick="submitForm()">提交</button>
        </div>
    </div>

    <div id="successPage" class="step">
        <div class="success-page">
            <div class="success-icon">🎉</div>
            <h1>提交成功！</h1>
            <p class="subtitle">期待一起度过美好的五一假期！</p>
        </div>
    </div>

    <div id="endPage" class="step">
        <div class="end-page">
            <div class="end-icon">😢</div>
            <h1>太可惜了...</h1>
            <p class="subtitle">等你有空的时候再约吧！</p>
            <div class="btn-group" style="margin-top: 40px;">
                <button class="btn-primary" onclick="restart()">重新开始</button>
            </div>
        </div>
    </div>
</div>

<script>
let selectedDates = [];
let selectedCity = '';
let customCityName = '';

function toggleDate(element) {
    const date = element.dataset.date;
    
    if (element.classList.contains('selected')) {
        element.classList.remove('selected');
        selectedDates = selectedDates.filter(d => d !== date);
    } else {
        element.classList.add('selected');
        selectedDates.push(date);
    }
}

function resetDates() {
    document.querySelectorAll('.date-item').forEach(item => {
        item.classList.remove('selected');
    });
    selectedDates = [];
}

function checkAndNext() {
    if (selectedDates.length < 2) {
        showStep('endPage');
    } else {
        showStep('step2');
    }
}

function selectCity(element) {
    document.querySelectorAll('.city-item').forEach(item => {
        item.classList.remove('selected');
    });
    
    element.classList.add('selected');
    selectedCity = element.dataset.city;
    document.getElementById('otherInput').classList.remove('show');
    document.getElementById('cityError').classList.remove('show');
}

function selectOtherCity(element) {
    document.querySelectorAll('.city-item').forEach(item => {
        item.classList.remove('selected');
    });
    
    element.classList.add('selected');
    selectedCity = 'other';
    document.getElementById('otherInput').classList.add('show');
    document.getElementById('customCity').focus();
    document.getElementById('cityError').classList.remove('show');
}

function updateCustomCity() {
    customCityName = document.getElementById('customCity').value.trim();
}

function nextToSubmit() {
    if (!selectedCity) {
        document.getElementById('cityError').classList.add('show');
        return;
    }
    
    if (selectedCity === 'other' && !customCityName) {
        document.getElementById('cityError').textContent = '请填写城市名称！';
        document.getElementById('cityError').classList.add('show');
        return;
    }
    
    const cityText = selectedCity === 'other' ? customCityName : selectedCity;
    document.getElementById('summaryDates').textContent = selectedDates.join('、');
    document.getElementById('summaryCity').textContent = cityText;
    
    showStep('step3');
}

function submitForm() {
    showStep('successPage');
    
    console.log('提交的数据：', {
        dates: selectedDates,
        city: selectedCity === 'other' ? customCityName : selectedCity
    });
}

function backToStep1() {
    showStep('step1');
}

function backToStep2() {
    showStep('step2');
}

function restart() {
    resetDates();
    selectedCity = '';
    customCityName = '';
    document.getElementById('customCity').value = '';
    document.getElementById('otherInput').classList.remove('show');
    document.getElementById('cityError').classList.remove('show');
    showStep('step1');
}

function showStep(stepId) {
    document.querySelectorAll('.step').forEach(step => {
        step.classList.remove('active');
    });
    document.getElementById(stepId).classList.add('active');
}
</script>
</body>
</html>
