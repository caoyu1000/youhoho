<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>五一邀请</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 30px;
            text-align: center;
        }

        .question {
            font-size: 20px;
            color: #555;
            margin-bottom: 25px;
            text-align: center;
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .date-grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 12px;
            margin: 20px 0;
        }

        .date-item {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
        }

        .date-item.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: scale(1.02);
        }

        .date-item:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .city-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 20px 0;
            max-height: 400px;
            overflow-y: auto;
        }

        .city-item {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 15px;
        }

        .city-item.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .city-item:hover {
            border-color: #667eea;
        }

        .result {
            text-align: center;
            padding: 20px;
        }

        .result-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .result-text {
            font-size: 18px;
            color: #666;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .result-detail {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: left;
        }

        .result-detail p {
            margin: 10px 0;
            font-size: 16px;
            color: #333;
        }

        .result-detail strong {
            color: #667eea;
        }

        .progress-bar {
            height: 4px;
            background: #f0f0f0;
            border-radius: 2px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
            }

            .question {
                font-size: 18px;
            }

            .city-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="progress-bar">
            <div class="progress-fill" id="progressBar" style="width: 0%"></div>
        </div>

        <div class="step active" id="step1">
            <h1>🎉 五一邀请</h1>
            <p class="question">五一有没有空呀？</p>
            <div class="btn-group">
                <button class="btn-secondary" onclick="handleNoTime()">没空😢</button>
                <button class="btn-primary" onclick="goToStep2()">有空😊</button>
            </div>
        </div>

        <div class="step" id="step2">
            <h1>📅 选择日期</h1>
            <p class="question">五一哪几天有时间呢？<br><small style="color: #999;">（至少选择2天）</small></p>
            <div class="date-grid" id="dateGrid">
                <div class="date-item" data-date="5月1日" onclick="toggleDate(this)">5月1日（周三）</div>
                <div class="date-item" data-date="5月2日" onclick="toggleDate(this)">5月2日（周四）</div>
                <div class="date-item" data-date="5月3日" onclick="toggleDate(this)">5月3日（周五）</div>
                <div class="date-item" data-date="5月4日" onclick="toggleDate(this)">5月4日（周六）</div>
                <div class="date-item" data-date="5月5日" onclick="toggleDate(this)">5月5日（周日）</div>
            </div>
            <div class="btn-group">
                <button class="btn-secondary" onclick="goToStep(1)">上一步</button>
                <button class="btn-primary" onclick="validateAndGoNext()">下一步</button>
            </div>
        </div>

        <div class="step" id="step3">
            <h1>🏙️ 选择城市</h1>
            <p class="question">想去哪个城市玩呢？</p>
            <div class="city-grid" id="cityGrid">
                <div class="city-item" data-city="北京" onclick="selectCity(this)">北京</div>
                <div class="city-item" data-city="上海" onclick="selectCity(this)">上海</div>
                <div class="city-item" data-city="广州" onclick="selectCity(this)">广州</div>
                <div class="city-item" data-city="深圳" onclick="selectCity(this)">深圳</div>
                <div class="city-item" data-city="成都" onclick="selectCity(this)">成都</div>
                <div class="city-item" data-city="杭州" onclick="selectCity(this)">杭州</div>
                <div class="city-item" data-city="重庆" onclick="selectCity(this)">重庆</div>
                <div class="city-item" data-city="西安" onclick="selectCity(this)">西安</div>
                <div class="city-item" data-city="南京" onclick="selectCity(this)">南京</div>
                <div class="city-item" data-city="武汉" onclick="selectCity(this)">武汉</div>
                <div class="city-item" data-city="厦门" onclick="selectCity(this)">厦门</div>
                <div class="city-item" data-city="青岛" onclick="selectCity(this)">青岛</div>
                <div class="city-item" data-city="大理" onclick="selectCity(this)">大理</div>
                <div class="city-item" data-city="丽江" onclick="selectCity(this)">丽江</div>
                <div class="city-item" data-city="三亚" onclick="selectCity(this)">三亚</div>
                <div class="city-item" data-city="桂林" onclick="selectCity(this)">桂林</div>
                <div class="city-item" data-city="昆明" onclick="selectCity(this)">昆明</div>
                <div class="city-item" data-city="长沙" onclick="selectCity(this)">长沙</div>
                <div class="city-item" data-city="苏州" onclick="selectCity(this)">苏州</div>
                <div class="city-item" data-city="天津" onclick="selectCity(this)">天津</div>
            </div>
            <p class="error-message" id="cityError" style="color: #ff4d4f; font-size: 14px; margin-top: 10px; text-align: center; display: none;">请选择一个城市哦~</p>
            <div class="btn-group">
                <button class="btn-secondary" onclick="goToStep(2)">上一步</button>
                <button class="btn-primary" onclick="submitForm()">提交</button>
            </div>
        </div>

        <div class="step" id="stepResult">
            <div class="result">
                <div class="result-icon">✅</div>
                <h1>提交成功！</h1>
                <div class="result-detail">
                    <p><strong>可用时间：</strong><span id="resultDates"></span></p>
                    <p><strong>想去城市：</strong><span id="resultCity"></span></p>
                </div>
                <p class="result-text">期待和你一起度过美好的五一假期！🎊</p>
            </div>
        </div>

        <div class="step" id="stepEnd">
            <div class="result">
                <div class="result-icon">😢</div>
                <h1>好的吧~</h1>
                <p class="result-text">那下次再约哦！<br>期待下次有机会一起玩~</p>
            </div>
        </div>

        <div class="step" id="stepNotEnoughDays">
            <div class="result">
                <div class="result-icon">😅</div>
                <h1>时间有点少呢~</h1>
                <p class="result-text" id="notEnoughDaysText"></p>
            </div>
        </div>
    </div>

    <script>
        let selectedDates = [];
        let selectedCity = '';

        function updateProgress(step) {
            const progress = ((step - 1) / 3) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function goToStep(step) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
            updateProgress(step);
        }

        function handleNoTime() {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('stepEnd').classList.add('active');
            updateProgress(4);
        }

        function handleNotEnoughDays() {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('stepNotEnoughDays').classList.add('active');
            
            const daysCount = selectedDates.length;
            const message = `只选了${daysCount}天，至少需要2天才能一起玩哦！下次多留点时间吧~`;
            document.getElementById('notEnoughDaysText').textContent = message;
            
            updateProgress(4);
        }

        function goToStep2() {
            goToStep(2);
        }

        function toggleDate(element) {
            const date = element.dataset.date;
            if (element.classList.contains('selected')) {
                element.classList.remove('selected');
                selectedDates = selectedDates.filter(d => d !== date);
            } else {
                element.classList.add('selected');
                selectedDates.push(date);
            }
        }

        function validateAndGoNext() {
            if (selectedDates.length < 2) {
                handleNotEnoughDays();
                return;
            }
            goToStep(3);
        }

        function selectCity(element) {
            document.querySelectorAll('.city-item').forEach(item => {
                item.classList.remove('selected');
            });
            element.classList.add('selected');
            selectedCity = element.dataset.city;
            document.getElementById('cityError').style.display = 'none';
        }

        function submitForm() {
            if (!selectedCity) {
                document.getElementById('cityError').style.display = 'block';
                return;
            }

            document.getElementById('resultDates').textContent = selectedDates.join('、');
            document.getElementById('resultCity').textContent = selectedCity;

            const data = {
                dates: selectedDates,
                city: selectedCity,
                time: new Date().toLocaleString('zh-CN')
            };
            
            let allResponses = JSON.parse(localStorage.getItem('surveyResponses') || '[]');
            allResponses.push(data);
            localStorage.setItem('surveyResponses', JSON.stringify(allResponses));
            
            console.log('提交的数据：', data);

            goToStep('Result');
            updateProgress(4);
        }

        updateProgress(1);
    </script>
</body>
</html>
